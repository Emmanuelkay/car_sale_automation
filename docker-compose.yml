version: '3.8'

services:
  api:
    build: .
    container_name: cars_whatsapp_api
    ports:
      - "8000:8000"
    environment:
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - META_PHONE_NUMBER_ID=${META_PHONE_NUMBER_ID}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://10.101.7.72/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-meta-llama/Meta-Llama-3-8B-Instruct}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    depends_on:
      - qdrant
    networks:
      - car_sales_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cars_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - car_sales_net

volumes:
  qdrant_data:

networks:
  car_sales_net:
    driver: bridge
